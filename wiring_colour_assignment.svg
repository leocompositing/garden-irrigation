<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 760" font-family="-apple-system, system-ui, sans-serif" font-size="12">
  <!--
    Wiring colour assignment - 123 Downs irrigation
    Rain Bird Maxi-Cable 7-core: RED, BLACK, WHITE, GREEN, BLUE, YELLOW, BROWN
    WHITE = Common (universal). YELLOW = Master Valve. Spares: BLACK, BROWN.
    Flow meter on separate 2-core shielded.
  -->

  <text x="460" y="28" text-anchor="middle" font-weight="700" font-size="18">Wiring Colour Assignment</text>
  <text x="460" y="48" text-anchor="middle" fill="#555" font-size="12">Rain Bird 7-core Maxi-Cable + 2-core shielded for flow meter · Hunter Pro HC Hydrawise (RA9025B)</text>

  <g>
    <rect x="290" y="80" width="340" height="120" rx="6" fill="#f4f6f8" stroke="#1a1a1a" stroke-width="1.6"/>
    <text x="460" y="105" text-anchor="middle" font-weight="700" font-size="13">Hunter Pro HC Hydrawise — Outdoor</text>
    <text x="460" y="121" text-anchor="middle" fill="#666" font-size="10">RA9025B · 6 stations · Wi-Fi</text>

    <g font-size="10" font-weight="600">
      <rect x="310" y="140" width="36" height="22" fill="#fff" stroke="#888"/>
      <text x="328" y="155" text-anchor="middle">1</text>
      <rect x="350" y="140" width="36" height="22" fill="#fff" stroke="#888"/>
      <text x="368" y="155" text-anchor="middle">2</text>
      <rect x="390" y="140" width="36" height="22" fill="#fff" stroke="#888"/>
      <text x="408" y="155" text-anchor="middle">3</text>
      <text x="368" y="178" text-anchor="middle" font-size="9" fill="#666">Stations</text>

      <rect x="450" y="140" width="50" height="22" fill="#fff" stroke="#888"/>
      <text x="475" y="155" text-anchor="middle">P/MV</text>
      <text x="475" y="178" text-anchor="middle" font-size="9" fill="#666">Master</text>

      <rect x="510" y="140" width="44" height="22" fill="#fff" stroke="#888"/>
      <text x="532" y="155" text-anchor="middle">COM</text>
      <text x="532" y="178" text-anchor="middle" font-size="9" fill="#666">24V return</text>

      <rect x="564" y="140" width="48" height="22" fill="#fff" stroke="#888"/>
      <text x="588" y="155" text-anchor="middle">SEN1</text>
      <text x="588" y="178" text-anchor="middle" font-size="9" fill="#666">Flow meter</text>
    </g>
  </g>

  <!-- Stn 1 -> RED -> Zone 1 -->
  <path d="M 328 162 V 280 H 160 V 470" stroke="#d6271a" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Stn 2 -> BLUE -> Zone 2 -->
  <path d="M 368 162 V 290 H 290 V 470" stroke="#1a73d6" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Stn 3 -> GREEN -> Zone 3 -->
  <path d="M 408 162 V 300 H 420 V 470" stroke="#2c9c3a" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- P/MV -> YELLOW -> Master Valve -->
  <path d="M 475 162 V 310 H 570 V 470" stroke="#e8b800" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- COM -> WHITE -> Common return -->
  <path d="M 532 162 V 330 H 730 V 470" stroke="#f0f0f0" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 532 162 V 330 H 730 V 470" stroke="#aaa" stroke-width="0.5" fill="none" stroke-linecap="round"/>
  <!-- Flow meter pair -->
  <path d="M 580 162 V 340 H 830 V 600" stroke="#ee7a1f" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 596 162 V 348 H 842 V 600" stroke="#7a4a1a" stroke-width="3" fill="none" stroke-linecap="round"/>

  <g font-size="10" fill="#555">
    <line x1="275" y1="240" x2="625" y2="240" stroke="#aaa" stroke-width="0.8" stroke-dasharray="2,3"/>
    <text x="280" y="232" font-style="italic">Rain Bird 7-core Maxi-Cable (controller → valve box)</text>
    <text x="625" y="358" font-style="italic">2-core shielded (flow meter, separate run)</text>
  </g>

  <!-- Zone 1 — RED -->
  <g>
    <rect x="100" y="470" width="120" height="80" rx="4" fill="#fff" stroke="#d6271a" stroke-width="1.8"/>
    <rect x="100" y="470" width="120" height="20" fill="#d6271a"/>
    <text x="160" y="485" text-anchor="middle" fill="#fff" font-weight="700" font-size="12">ZONE 1</text>
    <text x="160" y="510" text-anchor="middle" font-size="11" font-weight="600">Top Lawn North</text>
    <text x="160" y="525" text-anchor="middle" font-size="10" fill="#555">Manifold valve 1</text>
    <text x="160" y="542" text-anchor="middle" font-size="10" fill="#d6271a" font-weight="700">RED core</text>
  </g>

  <!-- Zone 2 — BLUE -->
  <g>
    <rect x="230" y="470" width="120" height="80" rx="4" fill="#fff" stroke="#1a73d6" stroke-width="1.8"/>
    <rect x="230" y="470" width="120" height="20" fill="#1a73d6"/>
    <text x="290" y="485" text-anchor="middle" fill="#fff" font-weight="700" font-size="12">ZONE 2</text>
    <text x="290" y="510" text-anchor="middle" font-size="11" font-weight="600">Top Lawn South</text>
    <text x="290" y="525" text-anchor="middle" font-size="10" fill="#555">Manifold valve 2</text>
    <text x="290" y="542" text-anchor="middle" font-size="10" fill="#1a73d6" font-weight="700">BLUE core</text>
  </g>

  <!-- Zone 3 — GREEN -->
  <g>
    <rect x="360" y="470" width="120" height="80" rx="4" fill="#fff" stroke="#2c9c3a" stroke-width="1.8"/>
    <rect x="360" y="470" width="120" height="20" fill="#2c9c3a"/>
    <text x="420" y="485" text-anchor="middle" fill="#fff" font-weight="700" font-size="12">ZONE 3</text>
    <text x="420" y="510" text-anchor="middle" font-size="11" font-weight="600">Bottom Section</text>
    <text x="420" y="525" text-anchor="middle" font-size="10" fill="#555">Manifold valve 3</text>
    <text x="420" y="542" text-anchor="middle" font-size="10" fill="#2c9c3a" font-weight="700">GREEN core</text>
  </g>

  <!-- Master Valve — YELLOW -->
  <g>
    <rect x="510" y="470" width="120" height="80" rx="4" fill="#fff" stroke="#e8b800" stroke-width="1.8"/>
    <rect x="510" y="470" width="120" height="20" fill="#e8b800"/>
    <text x="570" y="485" text-anchor="middle" fill="#1a1a1a" font-weight="700" font-size="12">MASTER VALVE</text>
    <text x="570" y="510" text-anchor="middle" font-size="11" font-weight="600">PGV-101 (BSP)</text>
    <text x="570" y="525" text-anchor="middle" font-size="10" fill="#555">BOX B (inline)</text>
    <text x="570" y="542" text-anchor="middle" font-size="10" fill="#a88800" font-weight="700">YELLOW core</text>
  </g>

  <!-- Common — WHITE -->
  <g>
    <rect x="670" y="470" width="120" height="80" rx="4" fill="#fff" stroke="#888" stroke-width="1.8"/>
    <rect x="670" y="470" width="120" height="20" fill="#e8e8e8" stroke="#aaa" stroke-width="0.6"/>
    <text x="730" y="485" text-anchor="middle" fill="#1a1a1a" font-weight="700" font-size="12">COMMON RETURN</text>
    <text x="730" y="510" text-anchor="middle" font-size="11" font-weight="600">Daisy-chain</text>
    <text x="730" y="525" text-anchor="middle" font-size="10" fill="#555">all 4 solenoids share</text>
    <text x="730" y="542" text-anchor="middle" font-size="10" fill="#444" font-weight="700">WHITE core (always)</text>
  </g>

  <!-- Flow meter -->
  <g>
    <rect x="765" y="600" width="140" height="80" rx="4" fill="#fff" stroke="#ee7a1f" stroke-width="1.8"/>
    <rect x="765" y="600" width="140" height="20" fill="#ee7a1f"/>
    <text x="835" y="615" text-anchor="middle" fill="#fff" font-weight="700" font-size="12">FLOW METER</text>
    <text x="835" y="640" text-anchor="middle" font-size="11" font-weight="600">Hunter HC-100-FLOW</text>
    <text x="835" y="655" text-anchor="middle" font-size="10" fill="#555">BOX A · 25mm BSP</text>
    <text x="835" y="670" text-anchor="middle" font-size="10" fill="#7a4a1a" font-weight="700">2-core shielded (own cable)</text>
  </g>

  <!-- Spares -->
  <g transform="translate(40, 600)">
    <rect x="0" y="0" width="220" height="80" rx="4" fill="#fff7d8" stroke="#d4a83a" stroke-width="1"/>
    <text x="10" y="20" font-weight="700" font-size="12" fill="#7a5a00">2 SPARE CORES — reserve</text>
    <g font-size="11">
      <line x1="14" y1="36" x2="40" y2="36" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
      <text x="48" y="40">BLACK — future zone / failover</text>
      <line x1="14" y1="56" x2="40" y2="56" stroke="#7a4a1a" stroke-width="4" stroke-linecap="round"/>
      <text x="48" y="60">BROWN — future zone / failover</text>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(280, 600)">
    <rect x="0" y="0" width="460" height="120" rx="4" fill="#fafbfc" stroke="#ccc"/>
    <text x="10" y="18" font-weight="700" font-size="12">Cable core assignment</text>

    <g font-size="11">
      <line x1="14" y1="36" x2="40" y2="36" stroke="#f0f0f0" stroke-width="5" stroke-linecap="round"/>
      <line x1="14" y1="36" x2="40" y2="36" stroke="#aaa" stroke-width="0.5" stroke-linecap="round"/>
      <text x="48" y="40"><tspan font-weight="700">WHITE</tspan> → Common (universal — never reassign)</text>

      <line x1="14" y1="56" x2="40" y2="56" stroke="#d6271a" stroke-width="4" stroke-linecap="round"/>
      <text x="48" y="60"><tspan font-weight="700">RED</tspan> → Zone 1 (Stn 1)</text>

      <line x1="14" y1="76" x2="40" y2="76" stroke="#1a73d6" stroke-width="4" stroke-linecap="round"/>
      <text x="48" y="80"><tspan font-weight="700">BLUE</tspan> → Zone 2 (Stn 2)</text>

      <line x1="14" y1="96" x2="40" y2="96" stroke="#2c9c3a" stroke-width="4" stroke-linecap="round"/>
      <text x="48" y="100"><tspan font-weight="700">GREEN</tspan> → Zone 3 (Stn 3)</text>

      <line x1="244" y1="36" x2="270" y2="36" stroke="#e8b800" stroke-width="4" stroke-linecap="round"/>
      <text x="278" y="40"><tspan font-weight="700">YELLOW</tspan> → Master Valve (P/MV)</text>

      <line x1="244" y1="56" x2="270" y2="56" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
      <text x="278" y="60"><tspan font-weight="700">BLACK</tspan> → SPARE</text>

      <line x1="244" y1="76" x2="270" y2="76" stroke="#7a4a1a" stroke-width="4" stroke-linecap="round"/>
      <text x="278" y="80"><tspan font-weight="700">BROWN</tspan> → SPARE</text>

      <text x="244" y="100" fill="#555" font-style="italic">Flow meter: separate 2-core shielded</text>
    </g>
  </g>

  <text x="460" y="745" text-anchor="middle" fill="#666" font-size="10" font-style="italic">
    24VAC solenoids (Z1, Z2, Z3, MV) share the WHITE common. 2 cores reserved for future expansion. Flow meter on its own shielded run direct to SEN1.
  </text>
</svg>
