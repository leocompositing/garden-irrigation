<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1400" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13">
  <!-- Definitions -->
  <defs>
    <pattern id="trenchHatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#FFF8E1"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#FFB300" stroke-width="1"/>
    </pattern>
    <pattern id="pitHatch" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
      <rect width="10" height="10" fill="#F3E5F5"/>
      <line x1="0" y1="0" x2="0" y2="10" stroke="#9C27B0" stroke-width="1" opacity="0.4"/>
    </pattern>
    <pattern id="grass" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#F1F8E9"/>
      <circle cx="3" cy="3" r="0.5" fill="#A5D6A7"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1565C0"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FF9800"/>
    </marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E91E63"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2196F3"/>
    </marker>
    <marker id="dimArrowL" markerWidth="10" markerHeight="10" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L2,3 z" fill="#666"/>
    </marker>
    <marker id="dimArrowR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#666"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#1565C0">Excavation Plan — Tank + Manifold Pit</text>
  <text x="550" y="58" text-anchor="middle" font-size="13" fill="#666">Top-down view · A &amp; B at the back fence in line with tank · C tucked south of A feeding zones</text>

  <!-- North arrow -->
  <g transform="translate(1010, 90)">
    <circle cx="0" cy="0" r="22" fill="white" stroke="#999" stroke-width="1"/>
    <path d="M0,-15 L7,8 L0,3 L-7,8 z" fill="#333"/>
    <text x="0" y="32" text-anchor="middle" font-size="11" fill="#666">N</text>
  </g>

  <!-- Scale -->
  <g transform="translate(60, 90)">
    <line x1="0" y1="0" x2="200" y2="0" stroke="#333" stroke-width="2"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#333" stroke-width="2"/>
    <line x1="100" y1="-5" x2="100" y2="5" stroke="#333" stroke-width="2"/>
    <line x1="200" y1="-5" x2="200" y2="5" stroke="#333" stroke-width="2"/>
    <text x="0" y="20" font-size="11" fill="#666">0</text>
    <text x="100" y="20" text-anchor="middle" font-size="11" fill="#666">0.5 m</text>
    <text x="200" y="20" text-anchor="end" font-size="11" fill="#666">1 m</text>
    <text x="100" y="-12" text-anchor="middle" font-size="11" fill="#666" font-weight="600">Scale (1 m = 200 px)</text>
  </g>

  <!-- ======================== -->
  <!-- FENCE (north boundary)   -->
  <!-- ======================== -->
  <g>
    <line x1="60" y1="180" x2="1040" y2="180" stroke="#5D4037" stroke-width="4" stroke-dasharray="14,4"/>
    <text x="60" y="170" font-size="12" fill="#5D4037" font-weight="600">▲ FENCE (rear boundary)</text>
  </g>

  <!-- ============================ -->
  <!-- TANK (1.35 m × 0.76 m)        -->
  <!-- 250 mm gap from fence         -->
  <!-- ============================ -->
  <g transform="translate(100, 230)">
    <rect x="0" y="0" width="270" height="152" fill="#E3F2FD" stroke="#1565C0" stroke-width="2.5" rx="6"/>
    <text x="135" y="60" text-anchor="middle" font-weight="700" fill="#1565C0" font-size="16">ENDURAMAXX</text>
    <text x="135" y="80" text-anchor="middle" fill="#1565C0" font-size="14">1000 L Tank</text>
    <text x="135" y="100" text-anchor="middle" fill="#666" font-size="11">1.35 × 0.76 m footprint</text>
    <text x="135" y="118" text-anchor="middle" fill="#666" font-size="11">on concrete pad</text>

    <!-- bulkhead on east wall, top -->
    <circle cx="270" cy="20" r="6" fill="#FF6F00" stroke="#E65100" stroke-width="1.5"/>
    <text x="278" y="14" font-size="11" fill="#E65100" font-weight="600">1" BSP bulkhead</text>
    <text x="278" y="28" font-size="10" fill="#666">(east wall, top)</text>
  </g>

  <!-- Tank dimension lines -->
  <g stroke="#666" stroke-width="1" fill="none">
    <line x1="100" y1="210" x2="370" y2="210" marker-start="url(#dimArrowL)" marker-end="url(#dimArrowR)"/>
    <text x="235" y="203" text-anchor="middle" font-size="11" fill="#666">1.35 m</text>
    <line x1="80" y1="230" x2="80" y2="382" marker-start="url(#dimArrowL)" marker-end="url(#dimArrowR)"/>
    <text x="72" y="306" text-anchor="middle" font-size="11" fill="#666" transform="rotate(-90 72 306)">0.76 m</text>

    <!-- Tank-fence gap -->
    <line x1="385" y1="180" x2="385" y2="230" marker-start="url(#dimArrowL)" marker-end="url(#dimArrowR)" stroke="#888"/>
    <text x="392" y="207" font-size="10" fill="#888">0.25 m gap</text>
  </g>

  <!-- ============================ -->
  <!-- TRENCH (L-shape: E + N + E)  -->
  <!-- ============================ -->
  <g>
    <!-- Segment 1: short east from bulkhead to clear tank wall -->
    <rect x="370" y="220" width="50" height="60" fill="url(#trenchHatch)" stroke="#FF9800" stroke-width="2" stroke-dasharray="6,3"/>

    <!-- Segment 2: north along east of tank to fence-line -->
    <rect x="370" y="180" width="50" height="40" fill="url(#trenchHatch)" stroke="#FF9800" stroke-width="2" stroke-dasharray="6,3"/>

    <!-- Segment 3: east along fence-line to BOX A -->
    <rect x="370" y="180" width="180" height="50" fill="url(#trenchHatch)" stroke="#FF9800" stroke-width="2" stroke-dasharray="6,3"/>

    <text x="490" y="210" text-anchor="middle" font-size="12" fill="#E65100" font-weight="600">TRENCH (L-shape)</text>
    <text x="490" y="224" text-anchor="middle" font-size="10" fill="#E65100">300 mm × 400 mm deep</text>

    <!-- pipe inside trench: 25 mm MDPE blue line -->
    <!-- Bulkhead at (370, 250) — exits east -->
    <line x1="370" y1="250" x2="395" y2="250" stroke="#1565C0" stroke-width="3"/>
    <!-- Elbow at (395, 250) — turn north -->
    <circle cx="395" cy="250" r="4" fill="#FF6F00" stroke="#333" stroke-width="1"/>
    <!-- North to (395, 205) -->
    <line x1="395" y1="250" x2="395" y2="205" stroke="#1565C0" stroke-width="3"/>
    <!-- Elbow at (395, 205) — turn east -->
    <circle cx="395" cy="205" r="4" fill="#FF6F00" stroke="#333" stroke-width="1"/>
    <!-- East to (550, 205) — enters BOX A west wall -->
    <line x1="395" y1="205" x2="550" y2="205" stroke="#1565C0" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- Trench segment dimensions -->
    <text x="345" y="250" text-anchor="end" font-size="10" fill="#666">0.25 m N</text>
    <text x="450" y="173" text-anchor="middle" font-size="10" fill="#666">0.75 m east (along fence)</text>
  </g>

  <!-- ====================================== -->
  <!-- PIT (rectangular, encloses A, B, C)     -->
  <!-- ====================================== -->
  <g>
    <!-- Pit outline -->
    <rect x="525" y="180" width="320" height="270" fill="url(#pitHatch)" stroke="#6A1B9A" stroke-width="2.5" stroke-dasharray="8,4"/>

    <!-- Pit dimensions -->
    <line x1="525" y1="465" x2="845" y2="465" stroke="#666" stroke-width="1" marker-start="url(#dimArrowL)" marker-end="url(#dimArrowR)"/>
    <text x="685" y="481" text-anchor="middle" font-size="12" fill="#666" font-weight="600">1.60 m (pit, E–W)</text>

    <line x1="867" y1="180" x2="867" y2="450" stroke="#666" stroke-width="1" marker-start="url(#dimArrowL)" marker-end="url(#dimArrowR)"/>
    <text x="876" y="318" font-size="12" fill="#666" font-weight="600" transform="rotate(-90 876 318)">1.35 m</text>

    <!-- Pit label -->
    <text x="685" y="166" text-anchor="middle" font-size="13" fill="#6A1B9A" font-weight="700">MANIFOLD PIT (0.5 m deep)</text>

    <!-- BOX A — top-left of pit (north against fence, in line with tank) -->
    <g transform="translate(550, 195)">
      <rect x="0" y="0" width="120" height="88" fill="#E3F2FD" stroke="#1565C0" stroke-width="2.5" rx="3"/>
      <text x="60" y="22" text-anchor="middle" font-weight="700" fill="#1565C0" font-size="14">BOX A</text>
      <text x="60" y="38" text-anchor="middle" font-size="10" fill="#1565C0">14" Jumbo</text>
      <text x="60" y="58" text-anchor="middle" font-size="11" fill="#333" font-weight="600">HYFM25</text>
      <text x="60" y="74" text-anchor="middle" font-size="10" fill="#666">flow meter</text>
    </g>

    <!-- BOX B — top-right of pit (east of A, also at fence) -->
    <g transform="translate(680, 195)">
      <rect x="0" y="0" width="120" height="88" fill="#FFEBEE" stroke="#C62828" stroke-width="2.5" rx="3"/>
      <text x="60" y="22" text-anchor="middle" font-weight="700" fill="#C62828" font-size="14">BOX B</text>
      <text x="60" y="38" text-anchor="middle" font-size="10" fill="#C62828">14" Jumbo</text>
      <text x="60" y="58" text-anchor="middle" font-size="11" fill="#333" font-weight="600">PGV-101</text>
      <text x="60" y="74" text-anchor="middle" font-size="10" fill="#666">master + blow-out</text>
    </g>

    <!-- BOX C — south of A (tucked under), feeds zones south -->
    <g transform="translate(550, 340)">
      <rect x="0" y="0" width="120" height="88" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2.5" rx="3"/>
      <text x="60" y="22" text-anchor="middle" font-weight="700" fill="#2E7D32" font-size="14">BOX C</text>
      <text x="60" y="38" text-anchor="middle" font-size="10" fill="#2E7D32">14" Jumbo</text>
      <text x="60" y="58" text-anchor="middle" font-size="11" fill="#333" font-weight="600">ISM-3zone</text>
      <text x="60" y="76" text-anchor="middle" font-size="9" fill="#666">manifold + filter</text>
    </g>

    <!-- Pipe inside pit: A → B → south → west → C -->
    <!-- A east wall (670, 239) → B west wall (680, 239) -->
    <line x1="670" y1="239" x2="680" y2="239" stroke="#1565C0" stroke-width="3"/>
    <text x="675" y="256" text-anchor="middle" font-size="9" fill="#1565C0">~50 mm</text>

    <!-- B south wall (740, 283) → south to (740, 320) -->
    <line x1="740" y1="283" x2="740" y2="320" stroke="#1565C0" stroke-width="3"/>
    <!-- Elbow at (740, 320) — turn west -->
    <circle cx="740" cy="320" r="4" fill="#FF6F00" stroke="#333" stroke-width="1"/>
    <!-- West from (740, 320) to (610, 320) (passes south of A toward C) -->
    <line x1="740" y1="320" x2="610" y2="320" stroke="#1565C0" stroke-width="3"/>
    <!-- Elbow at (610, 320) — turn south -->
    <circle cx="610" cy="320" r="4" fill="#FF6F00" stroke="#333" stroke-width="1"/>
    <!-- South from (610, 320) into BOX C north wall (610, 340) -->
    <line x1="610" y1="320" x2="610" y2="340" stroke="#1565C0" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- Annotations on internal pipework -->
    <text x="755" y="305" font-size="10" fill="#1565C0" font-weight="600">south</text>
    <text x="675" y="313" text-anchor="middle" font-size="10" fill="#1565C0" font-weight="600">west</text>

    <!-- Working margin annotation -->
    <text x="540" y="445" font-size="9" fill="#888" font-style="italic">150 mm working margin</text>
  </g>

  <!-- ============================== -->
  <!-- ZONE OUTFLOWS from BOX C south  -->
  <!-- ============================== -->
  <g transform="translate(580, 460)">
    <line x1="0" y1="0" x2="0" y2="60" stroke="#FF9800" stroke-width="3" marker-end="url(#arrowOrange)"/>
    <line x1="30" y1="0" x2="30" y2="60" stroke="#E91E63" stroke-width="3" marker-end="url(#arrowPink)"/>
    <line x1="60" y1="0" x2="60" y2="60" stroke="#2196F3" stroke-width="3" marker-end="url(#arrowBlue)"/>
    <text x="80" y="30" font-size="11" fill="#E65100" font-weight="600">↓ Z1 orange</text>
    <text x="80" y="50" font-size="11" fill="#AD1457" font-weight="600">↓ Z2 pink</text>
    <text x="80" y="70" font-size="11" fill="#1976D2" font-weight="600">↓ Z3 drip</text>
  </g>

  <!-- =============================================== -->
  <!-- 10×D / 5×D ANNOTATIONS                         -->
  <!-- =============================================== -->

  <!-- 10×D upstream callout -->
  <g>
    <rect x="60" y="450" width="320" height="100" fill="#FFF8E1" stroke="#F57C00" stroke-width="2" rx="6"/>
    <text x="220" y="472" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">⚠ 10×D Upstream Rule</text>
    <text x="78" y="492" font-size="11" fill="#333">Min straight pipe before meter:</text>
    <text x="78" y="510" font-size="11" fill="#333" font-weight="600">10 × 25 mm = <tspan fill="#E65100">250 mm</tspan></text>
    <text x="78" y="528" font-size="11" fill="#2E7D32">Available: ~750 mm (east trench segment along fence)</text>
    <text x="78" y="544" font-size="11" fill="#2E7D32" font-weight="600">✓ 3× margin (last elbow ≥ 250 mm before A)</text>

    <path d="M380,495 Q420,400 540,210" fill="none" stroke="#F57C00" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- 5×D downstream callout -->
  <g>
    <rect x="900" y="500" width="180" height="100" fill="#FFF8E1" stroke="#F57C00" stroke-width="2" rx="6"/>
    <text x="990" y="522" text-anchor="middle" font-size="12" font-weight="700" fill="#E65100">⚠ 5×D Downstream</text>
    <text x="918" y="542" font-size="10" fill="#333">After meter → master:</text>
    <text x="918" y="558" font-size="10" fill="#333" font-weight="600">5 × 25 = <tspan fill="#E65100">125 mm</tspan></text>
    <text x="918" y="574" font-size="10" fill="#2E7D32">Available: ~180 mm (A → B)</text>
    <text x="918" y="590" font-size="10" fill="#2E7D32" font-weight="600">✓ ~1.5× margin — tight</text>

    <path d="M900,540 Q820,400 700,250" fill="none" stroke="#F57C00" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- =============================================== -->
  <!-- VOLUME SUMMARY TABLE                           -->
  <!-- =============================================== -->
  <g transform="translate(60, 760)">
    <rect x="0" y="0" width="980" height="320" fill="white" stroke="#1565C0" stroke-width="2" rx="8"/>
    <text x="490" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1565C0">Excavation Summary</text>

    <!-- Header row -->
    <g transform="translate(20, 50)">
      <rect x="0" y="0" width="940" height="28" fill="#E3F2FD"/>
      <text x="10" y="19" font-size="12" font-weight="700" fill="#1565C0">Element</text>
      <text x="320" y="19" font-size="12" font-weight="700" fill="#1565C0">Length</text>
      <text x="460" y="19" font-size="12" font-weight="700" fill="#1565C0">Width</text>
      <text x="580" y="19" font-size="12" font-weight="700" fill="#1565C0">Depth</text>
      <text x="700" y="19" font-size="12" font-weight="700" fill="#1565C0">Volume</text>
      <text x="810" y="19" font-size="12" font-weight="700" fill="#1565C0">Notes</text>
    </g>

    <!-- Pit row -->
    <g transform="translate(20, 78)" font-size="12">
      <rect x="0" y="0" width="940" height="32" fill="#F3E5F5" opacity="0.4"/>
      <text x="10" y="20" font-weight="600">Manifold Pit (A &amp; B at fence, C south)</text>
      <text x="320" y="20">1.60 m (E–W)</text>
      <text x="460" y="20">1.35 m (N–S)</text>
      <text x="580" y="20">0.50 m</text>
      <text x="700" y="20" font-weight="700" fill="#6A1B9A">1.08 m³</text>
      <text x="810" y="20" font-size="10" fill="#666">3× 14" Jumbo + 150 mm margin</text>
    </g>

    <!-- Trench row -->
    <g transform="translate(20, 110)" font-size="12">
      <rect x="0" y="0" width="940" height="32" fill="#FFF8E1" opacity="0.4"/>
      <text x="10" y="20" font-weight="600">Tank → Pit Trench (L-shape: N then E)</text>
      <text x="320" y="20">1.00 m total</text>
      <text x="460" y="20">0.30 m</text>
      <text x="580" y="20">0.40 m</text>
      <text x="700" y="20" font-weight="700" fill="#E65100">0.12 m³</text>
      <text x="810" y="20" font-size="10" fill="#666">0.25 m N + 0.75 m E (along fence)</text>
    </g>

    <!-- Total row -->
    <g transform="translate(20, 142)" font-size="12">
      <rect x="0" y="0" width="940" height="32" fill="#E3F2FD"/>
      <text x="10" y="20" font-weight="700" fill="#1565C0">TOTAL EXCAVATION (in-situ volume)</text>
      <text x="700" y="20" font-weight="700" fill="#1565C0">1.20 m³</text>
      <text x="810" y="20" font-size="10" fill="#666">≈ 1.2 m³ — about 1–1.5 hr mini-digger</text>
    </g>

    <!-- Loose / heap row -->
    <g transform="translate(20, 174)" font-size="12">
      <rect x="0" y="0" width="940" height="32" fill="#FFEBEE"/>
      <text x="10" y="20" font-weight="700" fill="#C62828">⚠ Spoil heap (after 30% bulking)</text>
      <text x="700" y="20" font-weight="700" fill="#C62828">~1.56 m³</text>
      <text x="810" y="20" font-size="10" fill="#666">~ 12–15 wheelbarrow loads</text>
    </g>

    <!-- Pipe path note -->
    <g transform="translate(20, 218)" font-size="11">
      <text x="0" y="0" font-weight="700" fill="#1565C0">Pipe path inside pit (5 elbows total along the route):</text>
      <text x="0" y="20" fill="#333">Tank bulkhead → <tspan font-weight="600">east 0.15 m</tspan> → ⮤ <tspan font-weight="600">north 0.25 m</tspan> → ⮥ <tspan font-weight="600">east 0.75 m</tspan> (along fence) → enters BOX A west wall</text>
      <text x="0" y="38" fill="#333">→ through A (flow meter) → east → through B (master + tee) → ⮧ <tspan font-weight="600">south 0.20 m</tspan> → ⮤ <tspan font-weight="600">west 0.65 m</tspan> → ⮧ into BOX C north wall</text>
      <text x="0" y="56" fill="#333">→ through C (manifold) → south → 3× zone laterals exit south to garden</text>
      <text x="0" y="78" font-weight="700" fill="#C62828">⚠ 5×D downstream is tight</text>
      <text x="92" y="78" fill="#333">— A→B inline distance is ~180 mm vs 125 mm required. Position the meter as close to A's west wall as possible to maximise the gap.</text>
    </g>
  </g>

  <!-- =============================================== -->
  <!-- LAYOUT NOTE                                    -->
  <!-- =============================================== -->
  <g transform="translate(60, 1100)">
    <rect x="0" y="0" width="980" height="100" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1" rx="6"/>
    <text x="20" y="26" font-size="13" font-weight="700" fill="#2E7D32">Layout rationale (per site walk)</text>
    <text x="20" y="48" font-size="11" fill="#333">
      <tspan font-weight="600">A &amp; B at the back fence in line with the tank</tspan> — keeps the boxes tucked against the rear boundary, leaving the rest of the garden clear.
    </text>
    <text x="20" y="66" font-size="11" fill="#333">
      <tspan font-weight="600">BOX C south of A ("ahead")</tspan> — the manifold faces the garden so all three zone laterals exit south directly into the trench network.
    </text>
    <text x="20" y="84" font-size="11" fill="#333">
      <tspan font-weight="600">L-shaped trench from tank to A</tspan> — bulkhead exits east, elbows north into the gap behind tank, runs east along the fence-line into BOX A.
    </text>
  </g>

</svg>
