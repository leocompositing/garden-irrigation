<?xml version="1.0" encoding="UTF-8"?>
<svg width="1500" height="1000" viewBox="0 0 1500 1000" xmlns="http://www.w3.org/2000/svg" style="background:#fafafa;font-family:system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowDarkBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1e3a8a"/>
    </marker>
    <pattern id="groundHatch" patternUnits="userSpaceOnUse" width="8" height="8">
      <path d="M0,8 L8,0" stroke="#e5e7eb" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="1500" height="1000" fill="url(#groundHatch)"/>

  <!-- Title -->
  <text x="750" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="#111">Valve Box Layout — Top-Down View (to scale, per site photo)</text>
  <text x="750" y="54" text-anchor="middle" font-size="13" fill="#555">Scale: 1 mm ≈ 0.5 SVG units · Fence at top · Path edge at right · A &amp; B inline east of tank · C in front (south) of A &amp; B</text>

  <!-- Fence at top -->
  <rect x="50" y="75" width="1400" height="22" fill="#92400e" stroke="#78350f" stroke-width="1"/>
  <text x="750" y="91" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">— FENCE (north) —</text>

  <!-- Path/paving edge at right -->
  <line x1="1380" y1="97" x2="1380" y2="900" stroke="#9ca3af" stroke-width="3" stroke-dasharray="6,4"/>
  <text x="1410" y="500" text-anchor="middle" font-size="11" fill="#6b7280" font-weight="bold" transform="rotate(90 1410 500)">path / paving edge</text>

  <!-- TANK BASE (1200 × 800 mm) -->
  <rect x="80" y="150" width="600" height="400" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <text x="380" y="190" text-anchor="middle" font-size="20" font-weight="bold" fill="#991b1b">TANK (Enduramaxx 1000L slimline)</text>
  <text x="380" y="212" text-anchor="middle" font-size="12" fill="#7f1d1d">Base footprint 1200 × 800 mm · Height ~1500 mm</text>

  <!-- Tank outlet (factory 1" BSP male, low side, east-facing) -->
  <circle cx="680" cy="340" r="9" fill="#991b1b" stroke="#450a0a" stroke-width="2"/>
  <text x="680" y="372" text-anchor="middle" font-size="10" fill="#991b1b" font-weight="bold">1" BSP outlet (low, east side)</text>

  <!-- Float valve (inside tank, top, west end) -->
  <circle cx="160" cy="195" r="7" fill="#1e3a8a" stroke="#0c1e40" stroke-width="2"/>
  <text x="195" y="200" font-size="10" fill="#1e3a8a" font-weight="bold">float valve (½" inlet)</text>

  <!-- Tank dimension labels -->
  <line x1="80" y1="565" x2="680" y2="565" stroke="#dc2626" stroke-width="1"/>
  <line x1="80" y1="560" x2="80" y2="570" stroke="#dc2626" stroke-width="1"/>
  <line x1="680" y1="560" x2="680" y2="570" stroke="#dc2626" stroke-width="1"/>
  <text x="380" y="582" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="bold">1200 mm</text>

  <line x1="695" y1="150" x2="695" y2="550" stroke="#dc2626" stroke-width="1"/>
  <line x1="690" y1="150" x2="700" y2="150" stroke="#dc2626" stroke-width="1"/>
  <line x1="690" y1="550" x2="700" y2="550" stroke="#dc2626" stroke-width="1"/>
  <text x="725" y="353" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="bold" transform="rotate(90 725 353)">800 mm</text>

  <!-- FILL LINE (20mm MDPE) from mains tap, entering tank's front-left -->
  <path d="M 40,820 L 110,820 L 110,230 L 160,195" stroke="#1e3a8a" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowDarkBlue)"/>
  <text x="40" y="810" font-size="11" fill="#1e3a8a" font-weight="bold">FILL LINE — 20mm MDPE</text>
  <text x="40" y="794" font-size="10" fill="#1e3a8a">from mains tap / stopcock</text>

  <!-- Fill line ball valve -->
  <rect x="100" y="700" width="20" height="20" fill="#fbbf24" stroke="#b45309" stroke-width="1.5"/>
  <text x="130" y="707" font-size="9" fill="#b45309" font-weight="bold">20mm ball valve #350724</text>
  <text x="130" y="720" font-size="8" fill="#b45309">(fill-line isolation)</text>

  <!-- Fill line terminal elbow (20mm comp × ½"F) at float valve -->
  <rect x="140" y="185" width="22" height="22" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <text x="168" y="175" font-size="9" fill="#b45309" font-weight="bold">PM 20×½"F elbow #355373</text>
  <text x="168" y="187" font-size="8" fill="#b45309">(in basket — threads onto float valve)</text>

  <!-- BOX A: METER (inline east of tank) -->
  <rect x="780" y="240" width="280" height="200" rx="6" fill="#dcfce7" stroke="#15803d" stroke-width="3"/>
  <text x="920" y="268" text-anchor="middle" font-size="17" font-weight="bold" fill="#14532d">BOX A — Flow Meter</text>
  <text x="920" y="286" text-anchor="middle" font-size="11" fill="#166534">Hunter HRC-16 Jumbo</text>
  <text x="920" y="300" text-anchor="middle" font-size="11" fill="#166534">560 × 400 mm internal</text>

  <!-- Meter assembly inside Box A -->
  <rect x="800" y="335" width="22" height="22" fill="#cbd5e1" stroke="#475569" stroke-width="1.5"/>
  <text x="811" y="380" text-anchor="middle" font-size="8" fill="#333">PM-F</text>
  <text x="811" y="390" text-anchor="middle" font-size="8" fill="#333">#355403</text>

  <rect x="822" y="330" width="126" height="32" rx="4" fill="#bbf7d0" stroke="#15803d" stroke-width="2"/>
  <circle cx="885" cy="346" r="13" fill="#fff" stroke="#15803d" stroke-width="1.5"/>
  <text x="885" y="346" text-anchor="middle" font-size="7" fill="#14532d" font-weight="bold">HYFM25</text>
  <text x="885" y="381" text-anchor="middle" font-size="9" fill="#333">HC-100-FLOW-B</text>

  <rect x="948" y="335" width="22" height="22" fill="#cbd5e1" stroke="#475569" stroke-width="1.5"/>
  <text x="959" y="380" text-anchor="middle" font-size="8" fill="#333">PM-F</text>
  <text x="959" y="390" text-anchor="middle" font-size="8" fill="#333">#355403</text>

  <!-- pipe through Box A body -->
  <line x1="780" y1="346" x2="800" y2="346" stroke="#2563eb" stroke-width="5"/>
  <line x1="970" y1="346" x2="1060" y2="346" stroke="#2563eb" stroke-width="5"/>

  <!-- Box A dimension -->
  <line x1="780" y1="455" x2="1060" y2="455" stroke="#15803d" stroke-width="1"/>
  <line x1="780" y1="450" x2="780" y2="460" stroke="#15803d" stroke-width="1"/>
  <line x1="1060" y1="450" x2="1060" y2="460" stroke="#15803d" stroke-width="1"/>
  <text x="920" y="471" text-anchor="middle" font-size="10" fill="#15803d" font-weight="bold">560 mm</text>

  <!-- BOX B: MASTER + BLOW-OUT (inline east of Box A) -->
  <rect x="1080" y="240" width="280" height="200" rx="6" fill="#fce7f3" stroke="#be185d" stroke-width="3"/>
  <text x="1220" y="268" text-anchor="middle" font-size="17" font-weight="bold" fill="#831843">BOX B — Master + Blow-out</text>
  <text x="1220" y="286" text-anchor="middle" font-size="11" fill="#9f1239">Hunter HRC-16 Jumbo</text>
  <text x="1220" y="300" text-anchor="middle" font-size="11" fill="#9f1239">560 × 400 mm internal</text>
  <text x="1220" y="316" text-anchor="middle" font-size="10" fill="#9f1239" font-style="italic">⚠ size choice under review — see notes</text>

  <!-- PM Male Adaptor inlet -->
  <rect x="1097" y="338" width="22" height="18" fill="#c7d2fe" stroke="#3730a3" stroke-width="1.5"/>
  <!-- Master valve PGV-101 (BSP) -->
  <rect x="1119" y="328" width="56" height="38" rx="3" fill="#fde68a" stroke="#b45309" stroke-width="1.5"/>
  <rect x="1133" y="313" width="18" height="16" fill="#fbbf24" stroke="#b45309"/>
  <text x="1142" y="325" text-anchor="middle" font-size="8" fill="#78350f" font-weight="bold">SOL</text>
  <text x="1147" y="351" text-anchor="middle" font-size="8" fill="#78350f" font-weight="bold">PGV-101 (BSP)</text>
  <!-- PM Male Adaptor outlet -->
  <rect x="1175" y="338" width="22" height="18" fill="#c7d2fe" stroke="#3730a3" stroke-width="1.5"/>

  <text x="1108" y="400" text-anchor="middle" font-size="8" fill="#3730a3" font-weight="bold">PM-M #355293</text>
  <text x="1186" y="400" text-anchor="middle" font-size="8" fill="#3730a3" font-weight="bold">PM-M #355293</text>

  <!-- Short MDPE stub (~110mm) inside Box B to blow-out tee -->
  <line x1="1197" y1="347" x2="1220" y2="347" stroke="#2563eb" stroke-width="5"/>
  <text x="1208" y="327" text-anchor="middle" font-size="8" fill="#2563eb">~110mm stub</text>

  <!-- Blow-out tee (inline, in Box B) -->
  <rect x="1220" y="338" width="40" height="18" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
  <text x="1240" y="410" text-anchor="middle" font-size="9" fill="#333" font-weight="bold">blow-out tee #355338</text>

  <!-- Vertical blow-out branch (½" ball valve + PCL cap) -->
  <line x1="1240" y1="338" x2="1240" y2="315" stroke="#ea580c" stroke-width="4"/>
  <rect x="1232" y="305" width="16" height="10" fill="#fbbf24" stroke="#b45309" stroke-width="1"/>
  <text x="1255" y="314" font-size="9" fill="#b45309">½" BV + PCL</text>

  <!-- MDPE exiting Box B east -->
  <line x1="1260" y1="347" x2="1360" y2="347" stroke="#2563eb" stroke-width="5"/>

  <!-- Box B dimension -->
  <line x1="1080" y1="455" x2="1360" y2="455" stroke="#be185d" stroke-width="1"/>
  <line x1="1080" y1="450" x2="1080" y2="460" stroke="#be185d" stroke-width="1"/>
  <line x1="1360" y1="450" x2="1360" y2="460" stroke="#be185d" stroke-width="1"/>
  <text x="1220" y="471" text-anchor="middle" font-size="10" fill="#be185d" font-weight="bold">560 mm (current spec)</text>

  <!-- MAINLINE: Tank outlet → Box A -->
  <line x1="680" y1="340" x2="780" y2="346" stroke="#2563eb" stroke-width="5"/>
  <!-- 25mm ball valve on pump output -->
  <rect x="705" y="336" width="20" height="20" fill="#fbbf24" stroke="#b45309" stroke-width="1.5"/>
  <text x="715" y="323" text-anchor="middle" font-size="8" fill="#b45309" font-weight="bold">25mm BV #350725</text>

  <!-- MAINLINE: Box B east exit → southward bend → Box C -->
  <!-- Exit B east, then 90 south, then continue south to Box C -->
  <line x1="1360" y1="347" x2="1360" y2="640" stroke="#2563eb" stroke-width="5"/>
  <line x1="1360" y1="640" x2="1200" y2="640" stroke="#2563eb" stroke-width="5"/>
  <line x1="1200" y1="640" x2="1200" y2="700" stroke="#2563eb" stroke-width="5" marker-end="url(#arrowBlue)"/>

  <!-- BOX C: MANIFOLD (south of A-B, "in front of") -->
  <!-- Using Mike's real dims: internal 530 × 370 mm at top -->
  <rect x="935" y="700" width="265" height="185" rx="6" fill="#dbeafe" stroke="#1e40af" stroke-width="3"/>
  <text x="1067" y="727" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e3a8a">BOX C — Manifold (ISM-3zone)</text>
  <text x="1067" y="744" text-anchor="middle" font-size="11" fill="#1e40af">MB Irrigation Jumbo — from Mike's kit</text>
  <text x="1067" y="758" text-anchor="middle" font-size="10" fill="#1e40af">Internal (top) 530 × 370 mm · Depth 300 mm · External 630 × 480 mm</text>
  <text x="1067" y="772" text-anchor="middle" font-size="10" fill="#1e40af" font-style="italic">25mm compression inlet pre-fitted (no male adaptor needed)</text>

  <!-- Manifold body inside Box C -->
  <rect x="960" y="805" width="215" height="22" fill="#1e40af" stroke="#0c1e40" stroke-width="1.5"/>
  <text x="1067" y="821" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">ISM-3zone body</text>

  <!-- 3 zone valves on manifold -->
  <rect x="975" y="780" width="32" height="22" rx="3" fill="#fde68a" stroke="#b45309"/>
  <text x="991" y="796" text-anchor="middle" font-size="9" fill="#78350f" font-weight="bold">Z1</text>
  <rect x="1051" y="780" width="32" height="22" rx="3" fill="#fde68a" stroke="#b45309"/>
  <text x="1067" y="796" text-anchor="middle" font-size="9" fill="#78350f" font-weight="bold">Z2</text>
  <rect x="1127" y="780" width="32" height="22" rx="3" fill="#fde68a" stroke="#b45309"/>
  <text x="1143" y="796" text-anchor="middle" font-size="9" fill="#78350f" font-weight="bold">Z3</text>

  <!-- Zone outlets down -->
  <line x1="991" y1="827" x2="991" y2="875" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="1067" y1="827" x2="1067" y2="875" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="1143" y1="827" x2="1143" y2="875" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowBlue)"/>

  <!-- Box C dimension -->
  <line x1="935" y1="900" x2="1200" y2="900" stroke="#1e40af" stroke-width="1"/>
  <line x1="935" y1="895" x2="935" y2="905" stroke="#1e40af" stroke-width="1"/>
  <line x1="1200" y1="895" x2="1200" y2="905" stroke="#1e40af" stroke-width="1"/>
  <text x="1067" y="918" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="bold">530 mm internal (top)</text>

  <!-- Reference tape -->
  <rect x="780" y="510" width="580" height="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="1070" y="534" text-anchor="middle" font-size="10" fill="#854d0e" font-weight="bold">↔ tape reference ≈ 1245 mm (49") — matches Box A + Box B combined</text>

  <!-- Legend / notes panel -->
  <rect x="50" y="620" width="540" height="340" rx="6" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="70" y="645" font-size="14" font-weight="bold" fill="#111">Legend &amp; Flow Sequence</text>

  <line x1="70" y1="665" x2="110" y2="665" stroke="#2563eb" stroke-width="5"/>
  <text x="120" y="670" font-size="11" fill="#333">25 mm MDPE mainline</text>

  <line x1="70" y1="688" x2="110" y2="688" stroke="#1e3a8a" stroke-width="5"/>
  <text x="120" y="693" font-size="11" fill="#333">20 mm MDPE fill line (mains → tank)</text>

  <line x1="70" y1="711" x2="110" y2="711" stroke="#ea580c" stroke-width="4"/>
  <text x="120" y="716" font-size="11" fill="#333">½" blow-out branch (vertical in Box B)</text>

  <rect x="70" y="730" width="20" height="14" fill="#fde68a" stroke="#b45309"/>
  <text x="100" y="742" font-size="11" fill="#333">Solenoid valve (PGV) / ball valve</text>

  <rect x="70" y="753" width="20" height="14" fill="#c7d2fe" stroke="#3730a3"/>
  <text x="100" y="765" font-size="11" fill="#333">PM Male Adaptor #355293</text>

  <rect x="70" y="776" width="20" height="14" fill="#cbd5e1" stroke="#475569"/>
  <text x="100" y="788" font-size="11" fill="#333">PM Female Adaptor #355403</text>

  <text x="70" y="818" font-size="12" fill="#111" font-weight="bold">Flow sequence:</text>
  <text x="70" y="836" font-size="10" fill="#444">① Mains → backflow preventer → 20mm fill line → tank float valve</text>
  <text x="70" y="851" font-size="10" fill="#444">② Tank 1" outlet → 25mm ball valve → 25mm MDPE → BOX A</text>
  <text x="70" y="866" font-size="10" fill="#444">③ BOX A (flow meter) → 25mm MDPE east → BOX B (master + blow-out)</text>
  <text x="70" y="881" font-size="10" fill="#444">④ BOX B exit → east → south turn → south run → into BOX C inlet</text>
  <text x="70" y="896" font-size="10" fill="#444">⑤ BOX C manifold → 3 zone valves → Z1 / Z2 / Z3 laterals</text>

  <text x="70" y="928" font-size="11" fill="#065f46" font-weight="bold">✓ Straight-pipe rule satisfied in buried MDPE (not inside boxes)</text>
  <text x="70" y="946" font-size="11" fill="#b91c1c" font-weight="bold">⚠ Blow-out tee DOWNSTREAM of meter — protects HYFM25 turbine</text>

</svg>
